name: Gemini Issue Agent

# Triggers when someone adds the 'gemini-implement' label to any issue
on:
  issues:
    types: [labeled]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  gemini-implement:
    if: github.event.label.name == 'gemini-implement'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install -g groq-sdk

      - name: Run Groq Agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="agent/issue-$ISSUE_NUMBER"

          git config user.email "groq-agent[bot]@users.noreply.github.com"
          git config user.name "Groq Agent"
          git checkout -b $BRANCH

          # Collect all source files into context
          FILES_CONTEXT=$(find . \
            -type f \
            \( -name "*.jsx" -o -name "*.js" -o -name "*.yml" -o -name "*.json" -o -name "*.md" -o -name "*.css" -o -name "*.html" \) \
            ! -path "*/node_modules/*" \
            ! -path "*/.git/*" \
            ! -path "*/dist/*" \
            | head -30 \
            | while read f; do
                echo "=== FILE: $f ==="
                cat "$f"
                echo ""
              done)

          # Call Groq API and get implementation as a shell script of file writes
          node << 'EOF'
          const Groq = require('groq-sdk');
          const fs = require('fs');
          const path = require('path');

          const groq = new Groq({ apiKey: process.env.GROQ_API_KEY });

          async function main() {
            const filesContext = process.env.FILES_CONTEXT || '';
            const issueNumber = process.env.ISSUE_NUMBER;
            const issueTitle = process.env.ISSUE_TITLE;
            const issueBody = process.env.ISSUE_BODY;

            const prompt = `You are a coding agent implementing a GitHub issue.

Issue #${issueNumber}: ${issueTitle}

${issueBody}

Here are the current repository files:

${filesContext}

Your task: implement the changes requested in the issue.

Respond with ONLY a JSON array of file changes in this exact format:
[
  {
    "path": "relative/file/path",
    "content": "full file content here"
  }
]

Rules:
- Include the COMPLETE file content for each file you change or create
- Only include files that need to change
- Use relative paths from repo root
- No explanations, no markdown — just the JSON array`;

            const response = await groq.chat.completions.create({
              model: 'qwen-qwq-32b',
              messages: [{ role: 'user', content: prompt }],
              temperature: 0.2,
            });

            const raw = response.choices[0].message.content.trim();

            // Extract JSON array from response
            const match = raw.match(/\[[\s\S]*\]/);
            if (!match) {
              console.error('No JSON array found in response');
              console.error('Raw response:', raw.slice(0, 500));
              process.exit(1);
            }

            const changes = JSON.parse(match[0]);
            console.log(`Applying ${changes.length} file change(s)...`);

            for (const change of changes) {
              const dir = path.dirname(change.path);
              if (dir && dir !== '.') {
                fs.mkdirSync(dir, { recursive: true });
              }
              fs.writeFileSync(change.path, change.content);
              console.log(`Written: ${change.path}`);
            }
          }

          main().catch(e => { console.error(e); process.exit(1); });
          EOF

          git add -A

          if git diff --cached --quiet; then
            echo "No changes made by agent — exiting."
            exit 0
          fi

          git commit -m "feat: implement issue #$ISSUE_NUMBER — $ISSUE_TITLE [groq-agent]"
          git push origin $BRANCH

          gh pr create \
            --title "feat: closes #$ISSUE_NUMBER — $ISSUE_TITLE" \
            --body "## Summary
          Implemented by Groq Agent (qwen-qwq-32b) in response to issue #$ISSUE_NUMBER.

          Closes #$ISSUE_NUMBER" \
            --base main \
            --head $BRANCH

      - name: Comment on issue if failed
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ Groq agent failed to implement this issue. Check the [workflow logs](' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions) for details.'
            })
