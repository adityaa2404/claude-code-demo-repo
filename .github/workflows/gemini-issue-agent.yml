name: Gemini Issue Agent

# Triggers when someone adds the 'gemini-implement' label to any issue
on:
  issues:
    types: [labeled]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  gemini-implement:
    if: github.event.label.name == 'gemini-implement'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Gemini CLI
        run: npm install -g @google/gemini-cli

      - name: Run Gemini Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_CLI_TRUST_WORKSPACE: true
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="agent/issue-$ISSUE_NUMBER"

          git config user.email "gemini-agent[bot]@users.noreply.github.com"
          git config user.name "Gemini Agent"
          git checkout -b $BRANCH

          # Write prompt to a file to avoid shell escaping issues
          cat > /tmp/prompt.txt << 'PROMPT_EOF'
          You are an autonomous coding agent working on this repository.
          Implement the following GitHub issue completely.
          Read all files relevant to the issue before making changes.
          Implement every item mentioned in the issue.
          Keep changes focused — only what the issue asks for.
          Do NOT commit or push — just edit the files.
          PROMPT_EOF

          echo "Issue #$ISSUE_NUMBER: $ISSUE_TITLE" >> /tmp/prompt.txt
          echo "" >> /tmp/prompt.txt
          echo "$ISSUE_BODY" >> /tmp/prompt.txt

          # Run Gemini CLI in non-interactive mode
          gemini --prompt "$(cat /tmp/prompt.txt)" --yolo || \
          cat /tmp/prompt.txt | gemini --yolo || \
          echo "Gemini CLI invocation failed — check CLI version flags"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes made by agent — exiting."
            exit 0
          fi

          git commit -m "feat: implement issue #$ISSUE_NUMBER — $ISSUE_TITLE [gemini-agent]"
          git push origin $BRANCH

          gh pr create \
            --title "feat: closes #$ISSUE_NUMBER — $ISSUE_TITLE" \
            --body "## Summary
          Implemented by Gemini Agent in response to issue #$ISSUE_NUMBER.

          Closes #$ISSUE_NUMBER" \
            --base main \
            --head $BRANCH

      - name: Comment on issue if failed
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ Gemini agent failed to implement this issue. Check the [workflow logs](' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions) for details.'
            })
