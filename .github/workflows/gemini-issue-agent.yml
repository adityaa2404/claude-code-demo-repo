name: Gemini Issue Agent

on:
  issues:
    types: [labeled]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  gemini-implement:
    if: github.event.label.name == 'gemini-implement'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Groq SDK
        run: npm install groq-sdk
        working-directory: .github/scripts

      - name: Run Groq Agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="agent/issue-$ISSUE_NUMBER"
          git config user.email "groq-agent[bot]@users.noreply.github.com"
          git config user.name "Groq Agent"
          git checkout -b $BRANCH

          node .github/scripts/groq-agent.js

          git add -A
          if git diff --cached --quiet; then
            echo "No changes made by agent."
            exit 0
          fi

          git commit -m "feat: implement issue #$ISSUE_NUMBER [groq-agent]"
          git push origin $BRANCH

          gh pr create \
            --title "feat: closes #$ISSUE_NUMBER - $ISSUE_TITLE" \
            --body "Implemented by Groq Agent (qwen-qwq-32b). Closes #$ISSUE_NUMBER" \
            --base main \
            --head $BRANCH

      - name: Comment on issue if failed
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ Groq agent failed. Check the [workflow logs](' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions) for details.'
            })
